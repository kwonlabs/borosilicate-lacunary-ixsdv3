<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Synapse Design Mocks</title>
  <style>
    :root{--bg:#fff;--text:#111;--muted:#666;--hair:#efefef;--sans:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans)}

    header{position:sticky;top:0;background:rgba(255,255,255,.92);backdrop-filter: blur(10px);border-bottom:1px solid var(--hair)}
    .top{max-width:1100px;margin:0 auto;padding:14px 16px;display:flex;align-items:center;gap:10px}
    .brand{font-weight:700}
    .meta{color:var(--muted);font-size:13px}
    .spacer{flex:1}

    main{max-width:1100px;margin:0 auto;padding:16px}
    .layout{display:grid;grid-template-columns: 320px 1fr;gap:18px;align-items:start}

    .panel{padding:0}
    .sectionTitle{margin:0 0 10px;font-size:13px;color:var(--muted)}

    .list{display:grid;gap:8px}
    .card{padding:12px;border:1px solid var(--hair);border-radius:14px;text-decoration:none;color:inherit}
    .card .name{font-weight:700}
    .card .desc{margin-top:4px;color:var(--muted);font-size:13px;line-height:1.4}

    .seg{display:flex;gap:8px;flex-wrap:wrap}
    .seg button{border:1px solid var(--hair);background:#fff;color:var(--text);padding:8px 10px;border-radius:999px;font-size:13px}
    .seg button[aria-pressed="true"]{background:#f5f5f5}

    .viewer{border:1px solid var(--hair);border-radius:14px;overflow:hidden}
    .viewerHeader{padding:10px 12px;border-bottom:1px solid var(--hair);display:flex;align-items:center;justify-content:space-between;gap:12px}
    .viewerHeader .title{font-weight:700;font-size:13px}
    .viewerHeader .hint{color:var(--muted);font-size:12px}
    iframe{display:block;width:100%;height:78vh;border:0;background:#fff}

    @media (max-width: 900px){
      .layout{grid-template-columns: 1fr;}
      iframe{height:72vh}
    }
  </style>
</head>
<body>
  <header>
    <div class="top">
      <div class="brand">Synapse</div>
      <div class="meta">design mocks</div>
      <div class="spacer"></div>
      <div class="meta">mobile-first preview</div>
    </div>
  </header>

  <main>
    <div class="layout">
      <aside class="panel">
        <p class="sectionTitle">Projects</p>
        <div class="list">
          <a class="card" href="#" id="project-synapse">
            <div class="name">Synapse</div>
            <div class="desc">Dashboard mocks (A/B/C/D)</div>
          </a>
        </div>

        <div style="height:18px"></div>

        <p class="sectionTitle">Variants</p>
        <div class="seg" role="group" aria-label="Variant selector">
          <button data-v="A" aria-pressed="true">A</button>
          <button data-v="B" aria-pressed="false">B</button>
          <button data-v="C" aria-pressed="false">C</button>
          <button data-v="D" aria-pressed="false">D</button>
        </div>

        <p class="sectionTitle" style="margin-top:12px">Open standalone</p>
        <div class="list" style="gap:8px">
          <a class="card" id="standalone" href="./dashboard-A-ops-console.html">
            <div class="name">Open current mock</div>
            <div class="desc">새 탭으로 열기</div>
          </a>
        </div>
      </aside>

      <section class="viewer" aria-label="Mock viewer">
        <div class="viewerHeader">
          <div>
            <div class="title" id="viewer-title">A) Ops Console</div>
            <div class="hint">Tap A/B/C/D to switch</div>
          </div>
          <div class="hint" id="viewer-path">dashboard-A-ops-console.html</div>
        </div>
        <iframe id="frame" src="./dashboard-A-ops-console.html" loading="lazy"></iframe>
      </section>
    </div>

    <script>
      const map = {
        A: { title: 'A) Ops Console', file: './dashboard-A-ops-console.html' },
        B: { title: 'B) Calm Productivity', file: './dashboard-B-calm-productivity.html' },
        C: { title: 'C) Git-native', file: './dashboard-C-git-native.html' },
        D: { title: 'D) Minimal Monotone', file: './dashboard-D-minimal-monotone.html' },
      };

      const frame = document.getElementById('frame');
      const title = document.getElementById('viewer-title');
      const path = document.getElementById('viewer-path');
      const standalone = document.getElementById('standalone');

      function setVariant(v) {
        const info = map[v] || map.A;
        title.textContent = info.title;
        path.textContent = info.file.replace('./','');
        frame.src = info.file;
        standalone.href = info.file;

        document.querySelectorAll('.seg button').forEach((b) => {
          b.setAttribute('aria-pressed', b.dataset.v === v ? 'true' : 'false');
        });

        const url = new URL(window.location.href);
        url.searchParams.set('v', v);
        history.replaceState({}, '', url);
      }

      document.querySelectorAll('.seg button').forEach((b) => {
        b.addEventListener('click', () => setVariant(b.dataset.v));
      });

      const initial = new URL(window.location.href).searchParams.get('v') || 'A';
      setVariant(initial);
    </script>
  </main>
</body>
</html>
