<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Dashboard — K) Cyberpunk</title>
  <style>
    :root{
      --bg:#07050f;
      --panel: rgba(14, 10, 26, .65);
      --text:#e7e7ff;
      --muted:#a8a8c7;
      --hair: rgba(255,255,255,.12);
      --neon1:#00f5ff;
      --neon2:#ff2bd6;
      --neon3:#ffe600;
      --mono: ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
      --sans: ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:var(--sans);color:var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(0,245,255,.18) 0%, rgba(0,245,255,0) 55%),
        radial-gradient(circle at 80% 20%, rgba(255,43,214,.18) 0%, rgba(255,43,214,0) 55%),
        radial-gradient(circle at 60% 90%, rgba(255,230,0,.12) 0%, rgba(255,230,0,0) 55%),
        linear-gradient(180deg, #05040a 0%, var(--bg) 100%);
      min-height:100vh;
    }
    .topbar{position:sticky;top:0;background:rgba(7,5,15,.55);backdrop-filter: blur(14px);
      border-bottom:1px solid var(--hair);
      box-shadow: 0 0 0 1px rgba(0,245,255,.08), 0 16px 50px rgba(0,0,0,.45);
    }
    .wrap{max-width:1100px;margin:0 auto;padding:14px 16px;display:flex;align-items:center;gap:10px}
    select{background:rgba(0,0,0,.25);color:var(--text);border:1px solid rgba(0,245,255,.28);
      border-radius:999px;padding:8px 12px;font-size:13px;outline:none;
      box-shadow: 0 0 0 3px rgba(0,245,255,.10);
    }
    .spacer{flex:1}
    .btn{border:1px solid rgba(255,43,214,.35);background:rgba(255,43,214,.08);color:var(--text);
      padding:8px 10px;border-radius:12px;font-size:13px;text-decoration:none;
      box-shadow: 0 0 18px rgba(255,43,214,.08);
    }
    .btn.alt{border-color:rgba(0,245,255,.35);background:rgba(0,245,255,.08);box-shadow:0 0 18px rgba(0,245,255,.08)}
    main{max-width:1100px;margin:0 auto;padding:18px 16px}
    .grid{display:grid;grid-template-columns:1fr 360px;gap:16px}
    @media(max-width:900px){.grid{grid-template-columns:1fr}}
    .card{background:var(--panel);border:1px solid rgba(0,245,255,.18);border-radius:16px;padding:14px;
      box-shadow: 0 0 0 1px rgba(255,43,214,.10), 0 24px 70px rgba(0,0,0,.55);
    }
    .title{font-weight:900;letter-spacing:.4px}
    .muted{color:var(--muted);font-size:12px}
    .kpis{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-family:var(--mono)}
    .kpi{min-width:160px}
    .k{font-size:11px;color:rgba(231,231,255,.75);margin-bottom:6px}
    .v{font-size:16px}
    .line{display:flex;justify-content:space-between;gap:10px;padding:10px 0;border-top:1px solid rgba(255,255,255,.10)}
    .line:first-child{border-top:0}
    .tag{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;
      border:1px solid rgba(255,230,0,.35);padding:2px 8px;border-radius:999px;color:var(--text);
      box-shadow:0 0 18px rgba(255,230,0,.08)
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <select id="variant" aria-label="Select variant">
        <option value="A">A) Ops Console</option>
        <option value="B">B) Calm Productivity</option>
        <option value="C">C) Git-native</option>
        <option value="D">D) Minimal Monotone</option>
        <option value="E">E) Bootstrap</option>
        <option value="F">F) shadcn</option>
        <option value="G">G) Skeuomorphism</option>
        <option value="H">H) Glassmorphism</option>
        <option value="I">I) Neumorphism</option>
        <option value="J">J) Neo-brutal</option>
        <option value="K" selected>K) Cyberpunk</option>
        <option value="L">L) Ecopunk</option>
      </select>
      <div class="spacer"></div>
      <a class="btn alt" href="#">Board</a>
      <a class="btn" href="#">Sync</a>
      <a class="btn alt" href="#">Run</a>
    </div>
  </header>

  <main>
    <div class="grid">
      <section style="display:grid;gap:16px">
        <div class="card">
          <div class="title">DASHBOARD</div>
          <div class="muted">neon + blur + dark HUD</div>
          <div class="kpis">
            <div class="kpi"><div class="k">last_ok</div><div class="v">05:20</div></div>
            <div class="kpi"><div class="k">fails_24h</div><div class="v">2</div></div>
            <div class="kpi"><div class="k">pending</div><div class="v">4</div></div>
          </div>
          <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap">
            <span class="tag">webhook</span>
            <span class="tag">polling</span>
            <span class="tag">delete=propagate</span>
          </div>
        </div>

        <div class="card">
          <div class="title">EVENTS</div>
          <div class="line"><div>github.webhook issue.edit syn-101</div><div class="muted">ok</div></div>
          <div class="line"><div>linear.webhook issue.edit syn-130</div><div class="muted">fail(auth)</div></div>
        </div>
      </section>

      <aside style="display:grid;gap:16px">
        <div class="card">
          <div class="title">SETUP</div>
          <div class="muted" style="margin-top:10px;line-height:1.7">
            github_app: installed<br/>linked_repo: kwonlabs/synapse<br/>linear: api_key + webhook
          </div>
        </div>
      </aside>
    </div>

    <script>
      document.getElementById('variant')?.addEventListener('change', (e) => {
        const v = e.target.value;
                const map = {
          A: './dashboard-A-ops-console.html',
          B: './dashboard-B-calm-productivity.html',
          C: './dashboard-C-git-native.html',
          D: './dashboard-D-minimal-monotone.html',
          E: './dashboard-E-bootstrap.html',
          F: './dashboard-F-shadcn.html',
          G: './dashboard-G-skeuo.html',
          H: './dashboard-H-glass.html',
          I: './dashboard-I-neumo.html',
          J: './dashboard-J-neobrutal.html',
          K: './dashboard-K-cyberpunk.html',
          L: './dashboard-L-ecopunk.html',
        };
        window.location.href = map[v] || map.K;
      });
    </script>
  </main>
</body>
</html>
