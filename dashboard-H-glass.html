<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Dashboard — H) Glassmorphism</title>
  <style>
    :root{
      --text:#0b0f14;
      --muted:#4b5563;
      --hair: rgba(255,255,255,.35);
      --glass: rgba(255,255,255,.45);
      --glass2: rgba(255,255,255,.28);
      --mono: ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
      --sans: ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:var(--sans);color:var(--text);
      background: radial-gradient(circle at 20% 0%, #a78bfa 0%, rgba(167,139,250,.0) 55%),
                  radial-gradient(circle at 80% 20%, #60a5fa 0%, rgba(96,165,250,.0) 55%),
                  radial-gradient(circle at 60% 90%, #34d399 0%, rgba(52,211,153,.0) 55%),
                  #0b1020;
      min-height:100vh;
    }
    .topbar{position:sticky;top:0;background:rgba(255,255,255,.10);backdrop-filter: blur(14px);border-bottom:1px solid rgba(255,255,255,.18)}
    .wrap{max-width:1100px;margin:0 auto;padding:14px 16px;display:flex;align-items:center;gap:10px}
    select{background:rgba(255,255,255,.25);color:#0b0f14;border:1px solid rgba(255,255,255,.35);border-radius:999px;padding:8px 10px;font-size:13px}
    .spacer{flex:1}
    .btn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);color:#0b0f14;padding:8px 10px;border-radius:12px;font-size:13px;text-decoration:none}
    main{max-width:1100px;margin:0 auto;padding:22px 16px}
    .grid{display:grid;grid-template-columns: 1fr 360px;gap:18px}
    @media(max-width:900px){.grid{grid-template-columns:1fr}}
    .card{background:var(--glass);border:1px solid rgba(255,255,255,.35);border-radius:18px;padding:14px;box-shadow:0 18px 48px rgba(0,0,0,.28)}
    .card.soft{background:var(--glass2)}
    .title{font-weight:800}
    .muted{color:var(--muted);font-size:12px}
    .kpis{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-family:var(--mono)}
    .kpi{min-width:160px}
    .k{font-size:11px;color:rgba(15,23,42,.75);margin-bottom:6px}
    .v{font-size:16px}
    .line{display:flex;justify-content:space-between;gap:10px;padding:10px 0;border-top:1px solid rgba(255,255,255,.35)}
    .line:first-child{border-top:0}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <select id="variant" aria-label="Select variant">
        <option value="A">A) Ops Console</option>
        <option value="B">B) Calm Productivity</option>
        <option value="C">C) Git-native</option>
        <option value="D">D) Minimal Monotone</option>
        <option value="E">E) Bootstrap</option>
        <option value="F">F) shadcn</option>
        <option value="G">G) Skeuomorphism</option>
        <option value="H" selected>H) Glassmorphism</option>
        <option value="I">I) Neumorphism</option>
        <option value="J">J) Neo-brutal</option>
        <option value="K">K) Cyberpunk</option>
        <option value="L">L) Ecopunk</option>
      </select>
      <div class="spacer"></div>
      <a class="btn" href="#">Board</a>
      <a class="btn" href="#">Sync</a>
      <a class="btn" href="#">Run</a>
    </div>
  </header>

  <main>
    <div class="grid">
      <section style="display:grid;gap:18px">
        <div class="card">
          <div class="title">Dashboard</div>
          <div class="muted">glass, blur, floating panels</div>
          <div class="kpis">
            <div class="kpi"><div class="k">last_ok</div><div class="v">05:20</div></div>
            <div class="kpi"><div class="k">fails_24h</div><div class="v">2</div></div>
            <div class="kpi"><div class="k">pending</div><div class="v">4</div></div>
          </div>
        </div>
        <div class="card soft">
          <div class="title">Events</div>
          <div class="line"><div>github.webhook issue.edit syn-101</div><div class="muted">ok</div></div>
          <div class="line"><div>linear.webhook issue.edit syn-130</div><div class="muted">fail(auth)</div></div>
        </div>
      </section>
      <aside style="display:grid;gap:18px">
        <div class="card soft">
          <div class="title">Setup</div>
          <div class="muted" style="margin-top:10px;line-height:1.7">
            github_app: installed<br/>linked_repo: kwonlabs/synapse<br/>linear: api_key + webhook
          </div>
        </div>
      </aside>
    </div>

    <script>
      document.getElementById('variant')?.addEventListener('change', (e) => {
        const v = e.target.value;
                const map = {
          A: './dashboard-A-ops-console.html',
          B: './dashboard-B-calm-productivity.html',
          C: './dashboard-C-git-native.html',
          D: './dashboard-D-minimal-monotone.html',
          E: './dashboard-E-bootstrap.html',
          F: './dashboard-F-shadcn.html',
          G: './dashboard-G-skeuo.html',
          H: './dashboard-H-glass.html',
          I: './dashboard-I-neumo.html',
          J: './dashboard-J-neobrutal.html',
          K: './dashboard-K-cyberpunk.html',
          L: './dashboard-L-ecopunk.html',
        };
        window.location.href = map[v] || map.H;
      });
    </script>
  </main>
</body>
</html>
